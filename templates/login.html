{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="login-page-body"> <div class="auth-wrapper">

    <div class="credentials-panel signin">
        <h2 class="slide-element">Login</h2>

        <form method="post">
            {% csrf_token %}

            <div class="field-wrapper slide-element">
                <input type="text" name="username" required>
                <label>Username</label>
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="field-wrapper slide-element">
                <input type="password" name="password" required>
                <label>Password</label>
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="field-wrapper slide-element">
                <button class="submit-button" type="submit">Login</button>
            </div>

            <div class="switch-link slide-element">
                <p>Don't have an account?<br>
                    <a href="{% url 'register' %}" class="register-trigger">Sign Up</a>
                </p>
            </div>
        </form>
    </div>

    <div class="welcome-section signin">
        <h2 class="slide-element">WELCOME BACK!</h2>
    </div>

</div>

<script src="{% static 'js/style.js' %}"></script>

</body>
</html>
